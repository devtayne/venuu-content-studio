  .mode-tab.active { color: #F47B20; border-bottom-color: #F47B20; }
  .mode-tab .tab-icon { font-size: 15px; }

  /* MAIN LAYOUT */
  .main { padding: 2rem; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

  /* MODE HEADER */
  .mode-header { display: flex; flex-direction: column; gap: 4px; }
  .mode-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: #f0eee8; }
  .mode-sub { font-size: 13px; color: rgba(240,238,232,0.4); }

  /* FILTERS */
  .filters-grid { display: grid; gap: 12px; }
  .filters-2 { grid-template-columns: 1fr 1fr; }
  .filters-3 { grid-template-columns: 1fr 1fr 1fr; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(240,238,232,0.35); font-weight: 500; }

  /* GENERATE BUTTON */
  .generate-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; background: #F47B20; color: #0a0a0f; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; width: 100%; letter-spacing: 0.3px; }
  .generate-btn:hover { background: #ff8c35; transform: translateY(-1px); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* LOADING */
  .loading-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; display: none; }
  .loading-bar.active { display: block; }
  .loading-bar-inner { height: 100%; background: #F47B20; border-radius: 2px; animation: loadingAnim 1.5s ease-in-out infinite; width: 40%; }
  @keyframes loadingAnim { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

  .slide-copy-btn:hover { border-color: rgba(244,123,32,0.3); color: #F47B20; }

    .filters-2, .filters-3 { grid-template-columns: 1fr; }
    .mode-tab { padding: 0.75rem 1rem; font-size: 12px; }

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cfg = modeConfig[mode];
  document.getElementById('modeTitle').textContent = cfg.title;
  document.getElementById('modeSub').textContent = cfg.sub;
  renderFilters(cfg.filters);
  clearResults();
}

function renderFilters(filters) {
  const container = document.getElementById('filtersContainer');
  const gridClass = filters.length <= 2 ? 'filters-2' : 'filters-3';
  container.innerHTML = `<div class="filters-grid ${gridClass}">
    ${filters.map(f => `
      <div class="filter-group">
        <div class="filter-label">${f.label}</div>
        <input
          class="filter-input"
          id="filter_${f.id}"
          type="${f.type || 'text'}"
          placeholder="${f.placeholder}"
        />
      </div>
    `).join('')}
  </div>`;
}

function getFilterValues() {
  const cfg = modeConfig[currentMode];
  const values = {};
  cfg.filters.forEach(f => {
    const el = document.getElementById(`filter_${f.id}`);
    values[f.id] = el ? el.value.trim() : '';
  });
  return values;
}

function clearResults() {
  document.getElementById('resultsArea').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div>Fill in your filters and hit generate.</div>
      <div style="font-size:11px; opacity:0.5; margin-top:4px;">Powered by Claude AI + Higgsfield</div>
    </div>`;
  document.getElementById('errorMsg').classList.remove('visible');
}

async function generate() {
  const filters = getFilterValues();
  const cfg = modeConfig[currentMode];
  const prompt = cfg.prompt(filters);

  const btn = document.getElementById('genBtn');
  const loader = document.getElementById('loadingBar');
  const errorEl = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = 'Generating...';
  loader.classList.add('active');
  errorEl.classList.remove('visible');
  document.getElementById('resultsArea').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon" style="opacity:0.4;">◈</div>
      <div>Building your content...</div>
    </div>`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    let parsed;

    if (data.caption || data.prompt1 || data.slides || data.higgsfield_prompt) {
      parsed = data;
    } else if (data.content) {
      const raw = data.content.map(i => i.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } else {
      parsed = data;
    }

    renderResults(parsed);
  } catch(e) {
    errorEl.textContent = `Something went wrong: ${e.message}`;
    errorEl.classList.add('visible');
    clearResults();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate ✦';
    loader.classList.remove('active');
  }
}

function renderResults(data) {
  const area = document.getElementById('resultsArea');

  if (currentMode === 'story') {
    area.innerHTML = [
      { key: 'prompt1', label: 'Flyer Prompt 1' },
      { key: 'prompt2', label: 'Flyer Prompt 2' },
      { key: 'prompt3', label: 'Flyer Prompt 3' }
    ].map((item, i) => `
      <div class="result-card">
        <div class="result-card-header">
          <div class="result-label result-label-orange">${item.label}</div>
          <button class="copy-btn" onclick="copyText(this, \`${esc(data[item.key] || '')}\`)">Copy Prompt</button>
        </div>
        <div class="result-text">${esc(data[item.key] || 'Not generated')}</div>
      </div>
    `).join('');

  } else if (currentMode === 'carousel') {
    const slides = data.slides || [];
    area.innerHTML = `<div class="slides-container">
      ${slides.map(s => `
        <div class="slide-card">
          <div class="slide-number">Slide ${s.slide}</div>
          <div class="slide-copy">${esc(s.copy || '')}</div>
          <button class="slide-copy-btn" onclick="copyText(this, \`${esc(s.copy || '')}\`)">Copy Copy</button>
          <div class="slide-prompt-label">Image Prompt</div>
          <div class="slide-prompt">${esc(s.image_prompt || '')}</div>
          <button class="slide-copy-btn" onclick="copyText(this, \`${esc(s.image_prompt || '')}\`)">Copy Prompt</button>
        </div>
      `).join('')}
    </div>`;

  } else if (currentMode === 'reels') {
    area.innerHTML = [
      { key: 'higgsfield_prompt', label: 'Higgsfield Video Prompt' },
      { key: 'hook', label: 'Video Hook' },
      { key: 'caption', label: 'Instagram Caption' }
    ].map(item => `
      <div class="result-card">
        <div class="result-card-header">
          <div class="result-label result-label-orange">${item.label}</div>
          <button class="copy-btn" onclick="copyText(this, \`${esc(data[item.key] || '')}\`)">Copy</button>
        </div>
        <div class="result-text">${esc(data[item.key] || 'Not generated')}</div>
      </div>
    `).join('');
  }
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = btn.textContent.includes('Prompt') ? 'Copy Prompt' : btn.textContent.includes('Copy') ? 'Copy' : 'Copy Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/`/g,'&#96;')
    .replace(/\$/g,'&#36;');
}

// Init
renderFilters(modeConfig.story.filters);
</script>
